server:
  port: 8089

spring:
  application:
    name: cloud-brain-ai-llm

ai:
  llm:
    provider: ${AI_PROVIDER:openai}
    openai:
      api-key: ${AI_API_KEY}
      base-url: ${AI_BASE_URL:https://api.deepseek.com}
      model: ${AI_MODEL:deepseek-chat}

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
