server:
  port: 8081

spring:
  application:
    name: cloud-brain-auth
  datasource:
    url: jdbc:mysql://mysql:3306/cloud_brain_auth?useUnicode=true&characterEncoding=utf8mb4
    username: root
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
  kafka:
    bootstrap-servers: kafka:9092

jwt:
  secret: ${JWT_SECRET:cloud-brain-platform-secret-key-min-256-bits!!}
  access-expiration: 900
  refresh-expiration: 604800

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
