server:
  port: 8081

spring:
  application:
    name: cloud-brain-auth
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_brain_auth?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  kafka:
    bootstrap-servers: localhost:9092

jwt:
  secret: ${JWT_SECRET:cloud-brain-platform-secret-key-min-256-bits!!}
  access-expiration: 900
  refresh-expiration: 604800

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
