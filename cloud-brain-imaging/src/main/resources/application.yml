server:
  port: 8083

spring:
  application:
    name: cloud-brain-imaging
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_brain_imaging?useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: localhost:9092

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
