server:
  port: 8086

spring:
  application:
    name: cloud-brain-order-routing
  datasource:
    url: jdbc:mysql://mysql:3306/cloud_brain_order_routing?useUnicode=true&characterEncoding=utf8mb4
    username: root
    password: ${MYSQL_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    nacos:
      discovery:
        server-addr: nacos:8848
  kafka:
    bootstrap-servers: kafka:9092

management:
  endpoints:
    web:
      exposure:
        include: health
  tracing:
    sampling:
      probability: 1.0
