version: "3.9"

services:
  # ==================== 中间件 ====================
  mysql:
    image: mysql:8.0
    container_name: cloud-brain-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cloud-brain-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cloud-brain-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "cloud-brain-kafka-cluster"
    ports:
      - "9092:9092"
    networks:
      - cloud-brain-network

  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: cloud-brain-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - cloud-brain-network

  nacos:
    image: nacos/nacos-server:v2.3.1
    container_name: cloud-brain-nacos
    environment:
      MODE: standalone
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - cloud-brain-network

  # ==================== 可观测性 ====================
  zipkin:
    image: openzipkin/zipkin:3.3
    container_name: cloud-brain-zipkin
    ports:
      - "9411:9411"
    networks:
      - cloud-brain-network

  fluentd:
    image: fluent/fluentd:v1.16
    container_name: cloud-brain-fluentd
    volumes:
      - ./config/fluentd.conf:/fluentd/etc/fluent.conf
    networks:
      - cloud-brain-network

  elasticsearch-logging:
    image: elasticsearch:8.13.0
    container_name: cloud-brain-es-logging
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "9201:9200"
    volumes:
      - es_log_data:/usr/share/elasticsearch/data
    networks:
      - cloud-brain-network

  kibana:
    image: kibana:8.13.0
    container_name: cloud-brain-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch-logging:9200
    ports:
      - "5601:5601"
    networks:
      - cloud-brain-network

networks:
  cloud-brain-network:
    driver: bridge

volumes:
  mysql_data:
  es_data:
  es_log_data:
